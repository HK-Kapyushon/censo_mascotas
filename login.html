<!DOCTYPE html>
<html lang="es">
<head>

  <title>Censo de Mascotas — UPTC</title>
  <link rel="manifest" href="manifest.json">

  <link href="css/styles.css" rel="stylesheet">
  <style>
    body {
      background: var(--color-bg);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(83,74,183,0.13);
      padding: 2rem;
    }
    .pets-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 0.75rem;
    }
    .pet-wrap {
      width: 110px;
      height: 110px;
    }
    .pet-wrap svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .tab-btn {
      flex: 1;
      border: none;
      background: #f0eef8;
      color: var(--color-primary);
      font-weight: 700;
      padding: .5rem;
      border-radius: 8px;
      transition: all .2s;
    }
    .tab-btn.active {
      background: var(--color-primary);
      color: white;
    }
    .section-title {
      font-weight: 800;
      color: var(--color-text);
      text-align: center;
      margin-bottom: 1.25rem;
      font-size: 1.2rem;
    }
  </style>
</head>

  <!-- ===== PANEL LOGIN ===== -->

    <p class="section-title">Crear Cuenta</p>

    <form id="registroForm" novalidate>
      <div class="row g-2">
        <div class="col-6">
          <input class="form-control" id="reg_nombres"   placeholder="Nombres *"   required>

        <div class="col-6">

          <input class="form-control" id="reg_usuario"    placeholder="Usuario *" required autocomplete="off">
        </div>
        <div class="col-12">
          <input class="form-control" id="reg_contrasena" placeholder="Contraseña *" type="password" required autocomplete="new-password">
        </div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/pouchdb@9.0.0/dist/pouchdb.min.js"></script>
<script src="js/sync.js"></script>
<script src="js/db.js"></script>

<script>
// ================================================================
// ANIMACIÓN — los tres animales reaccionan al campo contraseña
// ================================================================

function showNormal() {
  // Perro: orejas normales, ojos abiertos
  document.getElementById('dogEarLeft').style.display    = '';
  document.getElementById('dogEarRight').style.display   = '';
  document.getElementById('dogEarLC').style.display      = 'none';
  document.getElementById('dogEarRC').style.display      = 'none';
  document.getElementById('dogEyesOpen').style.display   = '';
  document.getElementById('dogEyesClosed').style.display = 'none';

  // Gato: ojos abiertos
  document.getElementById('catEyesOpen').style.display   = '';
  document.getElementById('catEyesClosed').style.display = 'none';

  // Loro: alas normales, ojos abiertos
  document.getElementById('parrotWingL').style.display       = '';
  document.getElementById('parrotWingR').style.display       = '';
  document.getElementById('parrotWingLC').style.display      = 'none';
  document.getElementById('parrotWingRC').style.display      = 'none';
  document.getElementById('parrotEyesOpen').style.display    = '';
  document.getElementById('parrotEyesClosed').style.display  = 'none';
}

function showPassword() {
  // Perro: orejas tapan ojos, ojos cerrados
  document.getElementById('dogEarLeft').style.display    = 'none';
  document.getElementById('dogEarRight').style.display   = 'none';
  document.getElementById('dogEarLC').style.display      = '';
  document.getElementById('dogEarRC').style.display      = '';
  document.getElementById('dogEyesOpen').style.display   = 'none';
  document.getElementById('dogEyesClosed').style.display = '';

  // Gato: solo cierra los ojos
  document.getElementById('catEyesOpen').style.display   = 'none';
  document.getElementById('catEyesClosed').style.display = '';

  // Loro: alas suben a cubrir ojos, ojos cerrados
  document.getElementById('parrotWingL').style.display       = 'none';
  document.getElementById('parrotWingR').style.display       = 'none';
  document.getElementById('parrotWingLC').style.display      = '';
  document.getElementById('parrotWingRC').style.display      = '';
  document.getElementById('parrotEyesOpen').style.display    = 'none';
  document.getElementById('parrotEyesClosed').style.display  = '';
}

// Estado inicial
showNormal();

// Eventos
document.getElementById('usuario').addEventListener('focus', showNormal);
document.getElementById('contrasena').addEventListener('focus', showPassword);
document.getElementById('contrasena').addEventListener('blur',  showNormal);

// ================================================================
// TABS
// ================================================================
function mostrarTab(tab) {
  document.getElementById('panelLogin').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('panelRegistro').style.display = tab === 'registro' ? '' : 'none';
  document.getElementById('tabLogin').classList.toggle('active',    tab === 'login');
  document.getElementById('tabRegistro').classList.toggle('active', tab === 'registro');
}

// Ir directo al registro si viene ?registro=1 en la URL
if (location.search.includes('registro=1')) mostrarTab('registro');

// ================================================================
// LOGIN
// ================================================================
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const usuario    = document.getElementById('usuario').value.trim();
  const contrasena = document.getElementById('contrasena').value;
  const errDiv     = document.getElementById('errorLogin');
  const btn        = e.submitter;
  errDiv.textContent = '';
  btn.disabled = true; btn.textContent = 'Ingresando...';
  try {
    const res = await fetch(`${API_URL}/api/v1/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuario, contrasena })
    });
    if (!res.ok) throw new Error((await res.text()) || 'Credenciales inválidas');
    const data = await res.json();
    localStorage.setItem('token',         data.token);
    localStorage.setItem('tokenTipo',     data.tipoToken);
    localStorage.setItem('tokenExpira',   Date.now() + (data.expiraEn * 1000));
    localStorage.setItem('usuarioActual', usuario);
    window.location.href = 'index.html';
  } catch (err) {
    errDiv.textContent = err.message || 'Error de conexión.';
    btn.disabled = false; btn.textContent = 'Ingresar';
  }
});

// ================================================================
// REGISTRO
// ================================================================
document.getElementById('registroForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn    = e.submitter;
  const alerta = document.getElementById('alertaRegistro');

  const nombres    = document.getElementById('reg_nombres').value.trim();
  const apellidos  = document.getElementById('reg_apellidos').value.trim();
  const documento  = document.getElementById('reg_documento').value.trim();
  const usuario    = document.getElementById('reg_usuario').value.trim();
  const contrasena = document.getElementById('reg_contrasena').value;

  if (!nombres || !apellidos || !documento || !usuario || !contrasena) {
    alerta.className = 'alert alert-danger';
    alerta.textContent = 'Completa los campos obligatorios (*)';
    alerta.classList.remove('d-none');
    return;
  }

  const payload = {
    id:            crypto.randomUUID(),
    nombres,
    apellidos,
    tipoDocumento: document.getElementById('reg_tipoDoc').value,
    documento,
    direccion:     document.getElementById('reg_direccion').value.trim(),
    telefono:      document.getElementById('reg_telefono').value.trim(),
    ciudad:        document.getElementById('reg_ciudad').value.trim(),
    usuario,
    contrasena
  };

  btn.disabled = true; btn.textContent = 'Creando cuenta...';
  alerta.classList.add('d-none');

  try {
    await DB_PERSONAS.put({
      _id:            payload.id,
      nombres, apellidos,
      tipoDocumento:  payload.tipoDocumento,
      documento,
      direccion:      payload.direccion,
      telefono:       payload.telefono,
      ciudad:         payload.ciudad,
      usuario,
      contrasenaHash: contrasena,
      remoteId:       null,
      syncStatus:     'pending_create'
    });

    if (navigator.onLine) {
      const res = await fetch(`${API_URL}/api/v1/personas`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(await res.text());
      const creada = await res.json();
      const doc = await DB_PERSONAS.get(payload.id);
      delete doc.contrasenaHash;
      await DB_PERSONAS.put({ ...doc, remoteId: creada.id, syncStatus: 'synced' });

      alerta.className = 'alert alert-success';
      alerta.textContent = '✓ Cuenta creada. Ahora inicia sesión.';
      alerta.classList.remove('d-none');
      document.getElementById('registroForm').reset();
      setTimeout(() => mostrarTab('login'), 1800);
    } else {
      alerta.className = 'alert alert-warning';
      alerta.textContent = '⏳ Guardado localmente. Se sincronizará cuando haya conexión.';
      alerta.classList.remove('d-none');
    }
  } catch (err) {
    alerta.className = 'alert alert-danger';
    alerta.textContent = 'Error: ' + (err.message || 'No se pudo crear la cuenta.');
    alerta.classList.remove('d-none');
  } finally {
    btn.disabled = false; btn.textContent = 'Crear cuenta';
  }
});

// ================================================================
// Redirigir si ya tiene sesión válida

const token  = localStorage.getItem('token');
