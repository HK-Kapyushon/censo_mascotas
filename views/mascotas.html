<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#534AB7">
  <title>Mascotas — Censo</title>
  <link rel="manifest" href="../manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-pwa">
  <div class="container-fluid px-3">
    <button class="btn btn-sm btn-outline-light me-2" onclick="window.location.href='../index.html'">← Volver</button>
    <span class="navbar-brand mb-0">🐶 Mascotas</span>
    <div class="ms-auto d-flex align-items-center gap-2">
      <span id="syncStatus" class="badge bg-secondary">Comprobando...</span>
      <button id="btnSync" class="btn btn-sm btn-outline-light" onclick="sincronizarTodo()">⟳ Sync</button>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <!-- Formulario -->
  <div class="card-pwa">
    <h5 class="fw-bold mb-3" id="formTitle">Registrar Mascota</h5>
    <form id="mascotaForm" novalidate>
      <div class="row g-2">
        <div class="col-sm-6">
          <input id="nombre" class="form-control" placeholder="Nombre *" required>
        </div>
        <div class="col-sm-3">
          <select id="tipo" class="form-select" required>
            <option value="" disabled selected>Especie *</option>
            <option value="PERRO">Perro</option>
            <option value="GATO">Gato</option>
            <option value="PAJARO">Pájaro</option>
            <option value="CONEJO">Conejo</option>
            <option value="OTRO">Otro</option>
          </select>
        </div>
        <div class="col-sm-3">
          <select id="genero" class="form-select" required>
            <option value="" disabled selected>Género *</option>
            <option value="MACHO">Macho</option>
            <option value="HEMBRA">Hembra</option>
          </select>
        </div>
        <div class="col-sm-4">
          <input id="edad" type="number" step="0.5" min="0" class="form-control" placeholder="Edad (años) *" required>
        </div>
        <div class="col-sm-8">
          <label class="form-label small text-muted">Fotografía de perfil</label>
          <input id="foto" type="file" accept="image/*" class="form-control">
        </div>
      </div>
      <img id="fotoPreview" class="foto-preview mt-2 d-none" alt="Vista previa">
      <div class="d-flex gap-2 mt-3">
        <button id="btnGuardar" type="submit" class="btn btn-pwa-primary flex-fill">Agregar Mascota</button>
        <button id="btnCancelarEdicion" type="button" class="btn btn-outline-secondary d-none" onclick="cancelarEdicion()">Cancelar</button>
      </div>
    </form>
  </div>

  <!-- Tabla -->
  <div class="card-pwa">
    <h5 class="fw-bold mb-3">Mascotas Registradas</h5>
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Especie</th>
            <th>Género</th>
            <th>Edad</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaMascotas">
          <tr><td colspan="5" class="text-center text-muted">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pouchdb@9.0.0/dist/pouchdb.min.js"></script>
<script src="../js/sync.js"></script>
<script src="../js/db.js"></script>
<script src="../js/mascota.js"></script>
<script>
  if (!localStorage.getItem('token')) window.location.href = '../login.html';
</script>
</body>
</html>
