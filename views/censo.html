<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#534AB7">
  <title>Nuevo Censo — Mascotas</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
  <style>
    .seccion-titulo {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-l));
      color: white; font-weight: 800; padding: .4rem 1rem;
      border-radius: 8px; margin-bottom: 1rem; font-size: .95rem;
    }
    #mapCenso { height: 220px; border-radius: 10px; border: 2px solid var(--color-border); }
    .foto-preview { max-height: 180px; object-fit: cover; border-radius: 8px; width: 100%; border: 2px solid var(--color-accent); }
    .paso-bar { display: flex; gap: 6px; margin-bottom: 1rem; }
    .paso-seg { flex: 1; height: 5px; border-radius: 3px; background: var(--color-border); transition: background .3s; }
    .paso-seg.activo   { background: var(--color-primary); }
    .paso-seg.completo { background: #1a8a5a; }
  </style>
</head>
<body>

<nav class="navbar navbar-pwa">
  <div class="container-fluid px-3">
    <button class="btn btn-sm btn-outline-light me-2" onclick="history.back()">← Volver</button>
    <span class="navbar-brand mb-0">📋 Nuevo Censo</span>
    <div class="ms-auto"><span id="syncStatus" class="badge bg-secondary">Comprobando...</span></div>
  </div>
</nav>

<div class="container mt-3 pb-4" style="max-width:640px;">
  <div id="censoAlerta" class="alert d-none"></div>

  <div class="paso-bar">
    <div class="paso-seg activo" id="seg1"></div>
    <div class="paso-seg"        id="seg2"></div>
    <div class="paso-seg"        id="seg3"></div>
    <div class="paso-seg"        id="seg4"></div>
  </div>
  <p class="text-center text-muted small mb-3" id="pasoLabel">Paso 1 de 4 — Dueño</p>

  <!-- ══════ PASO 1: DUEÑO ══════ -->
  <div id="paso1">
    <div class="card-pwa">
      <div class="seccion-titulo">👤 Paso 1 — Dueño de la mascota</div>
      <div class="mb-3">
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-pwa-primary btn-sm" id="btnExistente" onclick="toggleDueno('existente')">Seleccionar existente</button>
          <button type="button" class="btn btn-pwa-outline  btn-sm" id="btnNuevo"    onclick="toggleDueno('nuevo')">Registrar nuevo</button>
        </div>
      </div>
      <div id="selectorDueno">
        <select id="persona" class="form-select mb-2">
          <option disabled selected>Cargando personas...</option>
        </select>
      </div>
      <div id="formNuevoDueno" style="display:none;">
        <div class="row g-2">
          <div class="col-6"><input class="form-control" id="d_nombres"   placeholder="Nombres *"></div>
          <div class="col-6"><input class="form-control" id="d_apellidos" placeholder="Apellidos *"></div>
          <div class="col-5">
            <select class="form-select" id="d_tipoDoc">
              <option value="CC">CC</option>
              <option value="CE">CE</option>
              <option value="TI">TI</option>
              <option value="Pasaporte">Pasaporte</option>
            </select>
          </div>
          <div class="col-7"><input class="form-control" id="d_documento" placeholder="N° Documento *"></div>
          <div class="col-12"><input class="form-control" id="d_direccion" placeholder="Dirección"></div>
          <div class="col-6"><input class="form-control" id="d_telefono"  placeholder="Teléfono" type="tel"></div>
          <div class="col-6"><input class="form-control" id="d_ciudad"    placeholder="Ciudad"></div>
        </div>
      </div>
      <button type="button" class="btn btn-pwa-primary w-100 mt-3" onclick="validarPaso1()">
        Siguiente → Mascota
      </button>
    </div>
  </div>

  <!-- ══════ PASO 2: MASCOTA ══════ -->
  <div id="paso2" style="display:none;">
    <div class="card-pwa">
      <div class="seccion-titulo">🐾 Paso 2 — Datos de la mascota</div>
      <div class="row g-2">
        <div class="col-12"><input class="form-control" id="m_nombre" placeholder="Nombre *"></div>
        <div class="col-4">
          <select class="form-select" id="m_tipo">
            <option value="" disabled selected>Especie *</option>
            <option value="PERRO">Perro</option>
            <option value="GATO">Gato</option>
            <option value="PAJARO">Pájaro</option>
            <option value="OTRO">Otro</option>
          </select>
        </div>
        <div class="col-4">
          <select class="form-select" id="m_genero">
            <option value="" disabled selected>Género *</option>
            <option value="MACHO">Macho</option>
            <option value="HEMBRA">Hembra</option>
          </select>
        </div>
        <div class="col-4"><input class="form-control" id="m_edad" type="number" step="0.5" min="0" placeholder="Edad *"></div>
      </div>

      <!-- Foto mascota con cámara y galería -->
      <div class="mt-3">
        <label class="form-label small fw-bold">Foto de la mascota <small class="text-muted"></small></label>
        <div class="d-flex gap-2 align-items-center flex-wrap mb-2">
          <select id="cameraSelectMascota" class="form-select" style="width:auto;font-size:.85rem;">
            <option value="environment">Cámara trasera</option>
            <option value="user">Cámara frontal</option>
          </select>
          <button type="button" id="btnCamaraMascota" class="btn btn-pwa-secondary btn-sm">📷 Abrir cámara</button>
          <button type="button" id="btnFotoMascota"   class="btn btn-pwa-danger   btn-sm" style="display:none;">🔴 Tomar foto</button>
        </div>
        <video  id="videoMascota"  width="100%" autoplay style="display:none;border-radius:8px;margin-bottom:6px;"></video>
        <canvas id="canvasMascota" width="320" height="240" style="display:none;"></canvas>
        <div class="mt-1">
          <label class="form-label small text-muted">O sube desde galería:</label>
          <input type="file" id="fotoMascota" class="form-control form-control-sm" accept="image/*">
        </div>
        <img id="prevMascota" class="foto-preview mt-2 d-none" alt="Foto mascota">
      </div>

      <div class="d-flex gap-2 mt-3">
        <button type="button" class="btn btn-pwa-outline" onclick="irPaso(1)">← Volver</button>
        <button type="button" class="btn btn-pwa-primary flex-fill" onclick="validarPaso2()">Siguiente → Foto censo</button>
      </div>
    </div>
  </div>

  <!-- ══════ PASO 3: FOTO DEL CENSO ══════ -->
  <div id="paso3" style="display:none;">
    <div class="card-pwa">
      <div class="seccion-titulo">📸 Paso 3 — Foto del censo <small style="font-weight:400;">(máx. 50 KB)</small></div>
      <div class="d-flex gap-2 align-items-center flex-wrap mb-2">
        <select id="cameraSelect" class="form-select" style="width:auto;font-size:.85rem;">
          <option value="environment">Cámara trasera</option>
          <option value="user">Cámara frontal</option>
        </select>
        <button type="button" id="btnCamara" class="btn btn-pwa-secondary btn-sm">📷 Abrir cámara</button>
        <button type="button" id="btnFoto"   class="btn btn-pwa-danger   btn-sm" style="display:none;">🔴 Tomar foto</button>
      </div>
      <video  id="video"  width="100%" autoplay style="display:none;border-radius:8px;margin-bottom:6px;"></video>
      <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
      <div class="mt-2">
        <label class="form-label small text-muted">O sube desde galería:</label>
        <input type="file" id="inputFoto" class="form-control form-control-sm" accept="image/*">
      </div>
      <div id="fotoInfo" class="form-text mt-1"></div>
      <img id="fotoPreview" class="foto-preview mt-2 d-none" alt="Vista previa censo">
      <div class="d-flex gap-2 mt-3">
        <button type="button" class="btn btn-pwa-outline" onclick="irPaso(2)">← Volver</button>
        <button type="button" class="btn btn-pwa-primary flex-fill" onclick="validarPaso3()">Siguiente → Ubicación</button>
      </div>
    </div>
  </div>

  <!-- ══════ PASO 4: GPS + GUARDAR ══════ -->
  <div id="paso4" style="display:none;">
    <div class="card-pwa">
      <div class="seccion-titulo">📍 Paso 4 — Ubicación y guardar</div>
      <button type="button" id="btnUbicacion" class="btn btn-pwa-secondary w-100 mb-3" onclick="obtenerUbicacion()">
        📍 Detectar mi ubicación actual
      </button>
      <div id="coords" class="form-text mb-2"></div>
      <div id="mapCenso"></div>
      <p class="text-muted small mt-3 mb-2">
        🏷️ Grupo: <strong>PWA_GRUPO_08</strong> ·
        Color: <span style="background:#C5C2FF;color:#3a3670;padding:1px 8px;border-radius:4px;border:1px solid #7A75C9;">#C5C2FF</span>
      </p>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-pwa-outline" onclick="irPaso(3)">← Volver</button>
        <button type="button" id="btnGuardar" class="btn btn-pwa-primary flex-fill" onclick="guardarCenso()">
          💾 Guardar Censo
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pouchdb@9.0.0/dist/pouchdb.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../js/sync.js"></script>
<script src="../js/db.js"></script>
<script src="../js/photo.js"></script>

<script>
const ID_PROYECTO    = 'PWA_GRUPO_08';
const COLOR_PROYECTO = '#C5C2FF';

if (!localStorage.getItem('token')) window.location.href = '../login.html';

let latActual      = null;
let lonActual      = null;
let imagenBase64   = '';
let fotoMascotaB64 = '';
let miniMapa       = null;
let modoNuevoDueno = false;
let streamMascota  = null;  // stream cámara mascota

document.addEventListener('DOMContentLoaded', async () => {
  await cargarPersonasSelector();
  document.getElementById('inputFoto').addEventListener('change', manejarFotoCenso);
  document.getElementById('fotoMascota').addEventListener('change', manejarFotoMascota);
  initCamaraMascota();
  if (typeof actualizarBadgeEstado === 'function') actualizarBadgeEstado();
});

// ============================================================
// Cámara para foto de MASCOTA
// ============================================================
function initCamaraMascota() {
  const btnC   = document.getElementById('btnCamaraMascota');
  const btnF   = document.getElementById('btnFotoMascota');
  const video  = document.getElementById('videoMascota');
  const canvas = document.getElementById('canvasMascota');
  const sel    = document.getElementById('cameraSelectMascota');

  btnC.onclick = async () => {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert('La cámara solo funciona en HTTPS o localhost.\nUsa la opción de galería para subir una foto.');
      return;
    }
    try {
      if (streamMascota) streamMascota.getTracks().forEach(t => t.stop());
      streamMascota = await navigator.mediaDevices.getUserMedia({ video: { facingMode: sel.value } });
      video.srcObject = streamMascota;
      video.style.display = 'block';
      btnF.style.display  = 'inline-block';
      btnC.textContent    = '🔄 Cambiar cámara';
    } catch(err) {
      alert('No se pudo acceder a la cámara: ' + err.message);
    }
  };

  btnF.onclick = () => {
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
    fotoMascotaB64 = canvas.toDataURL('image/jpeg', 0.85);
    // Detener cámara
    if (streamMascota) { streamMascota.getTracks().forEach(t => t.stop()); streamMascota = null; }
    video.style.display = 'none';
    btnF.style.display  = 'none';
    btnC.textContent    = '📷 Abrir cámara';
    // Mostrar preview
    document.getElementById('prevMascota').src = fotoMascotaB64;
    document.getElementById('prevMascota').classList.remove('d-none');
  };
}

// ============================================================
// Navegación por pasos
// ============================================================
function irPaso(n) {
  for (let i = 1; i <= 4; i++)
    document.getElementById('paso' + i).style.display = i === n ? '' : 'none';
  const labels = ['Dueño','Mascota','Foto censo','Ubicación'];
  document.getElementById('pasoLabel').textContent = `Paso ${n} de 4 — ${labels[n-1]}`;
  for (let i = 1; i <= 4; i++) {
    document.getElementById('seg' + i).className =
      'paso-seg' + (i < n ? ' completo' : i === n ? ' activo' : '');
  }
  // Detener cámara mascota si se cambia de paso
  if (n !== 2 && streamMascota) {
    streamMascota.getTracks().forEach(t => t.stop()); streamMascota = null;
    document.getElementById('videoMascota').style.display = 'none';
    document.getElementById('btnFotoMascota').style.display = 'none';
    document.getElementById('btnCamaraMascota').textContent = '📷 Abrir cámara';
  }
  window.scrollTo(0, 0);
}

function validarPaso1() {
  if (!modoNuevoDueno) {
    const v = document.getElementById('persona').value;
    if (!v || v.includes('Cargando') || v.includes('Selecciona')) {
      mostrarAlerta('censoAlerta', 'Selecciona un dueño o usa "Registrar nuevo".', 'danger');
      return;
    }
  } else {
    const nombres   = document.getElementById('d_nombres').value.trim();
    const apellidos = document.getElementById('d_apellidos').value.trim();
    const documento = document.getElementById('d_documento').value.trim();
    if (!nombres || !apellidos || !documento) {
      mostrarAlerta('censoAlerta', 'Completa nombres, apellidos y documento del dueño.', 'danger');
      return;
    }
  }
  irPaso(2);
}

function validarPaso2() {
  const n = document.getElementById('m_nombre').value.trim();
  const t = document.getElementById('m_tipo').value;
  const g = document.getElementById('m_genero').value;
  const e = parseFloat(document.getElementById('m_edad').value);
  if (!n || !t || !g || isNaN(e)) {
    mostrarAlerta('censoAlerta', 'Completa todos los datos de la mascota.', 'danger');
    return;
  }
  irPaso(3);
}

function validarPaso3() {
  if (!imagenBase64) {
    mostrarAlerta('censoAlerta', 'Toma o sube una fotografía del censo.', 'danger');
    return;
  }
  irPaso(4);
}

// ============================================================
// Toggle dueño existente / nuevo
// ============================================================
function toggleDueno(modo) {
  modoNuevoDueno = modo === 'nuevo';
  document.getElementById('selectorDueno').style.display  = modoNuevoDueno ? 'none' : '';
  document.getElementById('formNuevoDueno').style.display = modoNuevoDueno ? ''     : 'none';
  document.getElementById('btnExistente').className = 'btn btn-sm ' + (modoNuevoDueno ? 'btn-pwa-outline'  : 'btn-pwa-primary');
  document.getElementById('btnNuevo').className     = 'btn btn-sm ' + (modoNuevoDueno ? 'btn-pwa-primary'  : 'btn-pwa-outline');
}

// ============================================================
// Cargar selector de personas
// ============================================================
async function cargarPersonasSelector() {
  const sel = document.getElementById('persona');
  sel.innerHTML = '<option disabled selected>Cargando...</option>';
  let personas = [];

  if (navigator.onLine) {
    try {
      const res = await fetch(`${API_URL}/api/v1/personas`);
      if (res.ok) personas = await res.json();
    } catch(e) {}
  }

  // Sin internet: cargar desde PouchDB
  if (!personas.length) {
    const local = await dbObtenerTodos(DB_PERSONAS);
    personas = local
      .filter(p => p.nombres && p.apellidos)
      .map(p => ({ id: p.remoteId || p._id, nombres: p.nombres, apellidos: p.apellidos }));
  }

  // Último recurso offline: mostrar solo el usuario de sesión activa
  if (!personas.length) {
    const u = localStorage.getItem('usuarioActual');
    sel.innerHTML = '<option disabled selected>' + (u ? 'Solo tú disponible sin conexión' : 'Sin personas') + '</option>';
    if (u) {
      const o = document.createElement('option');
      o.value = 'offline-user';
      o.textContent = u + ' (sesión actual)';
      sel.appendChild(o);
    }
    return;
  }

  sel.innerHTML = '<option disabled selected>Selecciona el dueño</option>';
  personas.forEach(p => {
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = `${p.nombres} ${p.apellidos}`;
    sel.appendChild(o);
  });
}

// ============================================================
// Geolocalización (RF05)
// ============================================================
function obtenerUbicacion() {
  const btn = document.getElementById('btnUbicacion');
  const div = document.getElementById('coords');
  if (!navigator.geolocation) { div.innerHTML = '<span class="text-danger">No soportado</span>'; return; }
  btn.disabled = true; btn.textContent = '⏳ Detectando...';
  navigator.geolocation.getCurrentPosition(pos => {
    latActual = pos.coords.latitude;
    lonActual = pos.coords.longitude;
    div.innerHTML = `<span class="text-success">📍 ${latActual.toFixed(6)}, ${lonActual.toFixed(6)} <small>(±${pos.coords.accuracy.toFixed(0)}m)</small></span>`;
    btn.textContent = '✓ Ubicación obtenida';
    btn.classList.replace('btn-pwa-secondary', 'btn-success');
    if (miniMapa) { miniMapa.remove(); miniMapa = null; }
    miniMapa = L.map('mapCenso').setView([latActual, lonActual], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(miniMapa);
    L.marker([latActual, lonActual], { icon: L.divIcon({
      className: '',
      html: `<svg width="28" height="36" viewBox="0 0 32 40"><path d="M16 0 C7.16 0 0 7.16 0 16 C0 27 16 40 16 40 C16 40 32 27 32 16 C32 7.16 24.84 0 16 0Z" fill="${COLOR_PROYECTO}" stroke="#7A75C9" stroke-width="2.5"/><text x="16" y="22" text-anchor="middle" font-size="14" fill="white">🐾</text></svg>`,
      iconSize: [28,36], iconAnchor: [14,36]
    })}).bindPopup('<b>Tu ubicación</b>').openPopup().addTo(miniMapa);
  }, err => {
    div.innerHTML = `<span class="text-danger">${err.message}</span>`;
    btn.disabled = false; btn.textContent = '📍 Reintentar';
  }, { enableHighAccuracy: true, timeout: 12000 });
}

// ============================================================
// Compresión foto hasta 50 KB (RF04)
// ============================================================
const MAX_B64 = 66000;

function comprimirHasta50KB(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas');
      let w = img.naturalWidth || 640, h = img.naturalHeight || 480;
      if (w > 1200 || h > 1200) { const r = Math.min(1200/w, 1200/h); w = Math.round(w*r); h = Math.round(h*r); }
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      let res = null;
      for (const q of [0.9, 0.75, 0.6, 0.45, 0.3, 0.15, 0.05]) {
        const b = cv.toDataURL('image/jpeg', q);
        if (b.length <= MAX_B64) { res = b; break; }
      }
      if (!res) {
        cv.width = Math.round(w/2); cv.height = Math.round(h/2);
        cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
        res = cv.toDataURL('image/jpeg', 0.1);
      }
      resolve(res);
    };
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

// Foto del CENSO — Base64 comprimido
function manejarFotoCenso(e) {
  const file = e.target.files[0];
  if (!file) { imagenBase64 = ''; document.getElementById('fotoPreview').classList.add('d-none'); return; }
  document.getElementById('fotoInfo').innerHTML = '<span class="text-muted">⏳ Optimizando...</span>';
  const reader = new FileReader();
  reader.onload = async () => {
    const c = await comprimirHasta50KB(reader.result);
    if (!c) { document.getElementById('fotoInfo').innerHTML = '<span class="text-danger">Error al procesar</span>'; return; }
    imagenBase64 = c;
    const kb = (c.length * 0.75 / 1024).toFixed(1);
    document.getElementById('fotoPreview').src = c;
    document.getElementById('fotoPreview').classList.remove('d-none');
    document.getElementById('fotoInfo').innerHTML = `<span class="text-success">✓ ${kb} KB</span>`;
  };
  reader.readAsDataURL(file);
}

// Foto de MASCOTA desde galería
function manejarFotoMascota(e) {
  const file = e.target.files[0];
  if (!file) { fotoMascotaB64 = ''; document.getElementById('prevMascota').classList.add('d-none'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    fotoMascotaB64 = reader.result;
    document.getElementById('prevMascota').src = fotoMascotaB64;
    document.getElementById('prevMascota').classList.remove('d-none');
  };
  reader.readAsDataURL(file);
}

// Foto del CENSO desde cámara (photo.js)
window.onFotoCapturada = async function(b64) {
  document.getElementById('fotoInfo').innerHTML = '<span class="text-muted">⏳ Optimizando...</span>';
  const c = await comprimirHasta50KB(b64);
  if (!c) { mostrarAlerta('censoAlerta', 'No se pudo procesar la foto.', 'danger'); return; }
  imagenBase64 = c;
  const kb = (c.length * 0.75 / 1024).toFixed(1);
  document.getElementById('fotoPreview').src = c;
  document.getElementById('fotoPreview').classList.remove('d-none');
  document.getElementById('fotoInfo').innerHTML = `<span class="text-success">✓ ${kb} KB</span>`;
};

// ============================================================
// Guardar censo (RF03-RF06) — subida inmediata si hay internet
// Sin internet: guarda local y sincroniza al reconectar
// ============================================================
async function guardarCenso() {
  if (!latActual || !lonActual) {
    mostrarAlerta('censoAlerta', 'Obtén la ubicación GPS primero.', 'danger'); return;
  }
  const btn = document.getElementById('btnGuardar');
  btn.disabled = true; btn.textContent = '⏳ Guardando...';

  try {
    const enLinea = navigator.onLine;

    // ══ PERSONA (dueño) ══
    let idDueno;
    if (modoNuevoDueno) {
      const id = crypto.randomUUID();
      const payload = {
        nombres:       document.getElementById('d_nombres').value.trim(),
        apellidos:     document.getElementById('d_apellidos').value.trim(),
        tipoDocumento: document.getElementById('d_tipoDoc').value,
        documento:     document.getElementById('d_documento').value.trim(),
        direccion:     document.getElementById('d_direccion').value.trim(),
        telefono:      document.getElementById('d_telefono').value.trim(),
        ciudad:        document.getElementById('d_ciudad').value.trim()
      };
      await DB_PERSONAS.put({ _id: id, ...payload, remoteId: null, syncStatus: 'pending_create' });
      idDueno = id;
      if (enLinea) {
        try {
          btn.textContent = '⏳ Registrando dueño...';
          const res = await fetch(`${API_URL}/api/v1/personas`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error('Dueño: ' + await res.text());
          const creada = await res.json();
          idDueno = creada.id;
          const doc = await DB_PERSONAS.get(id);
          await DB_PERSONAS.put({ ...doc, remoteId: creada.id, syncStatus: 'synced' });
        } catch(fe) { console.warn('[Censo] Sin red para dueño:', fe.message); }
      }
    } else {
      idDueno = document.getElementById('persona').value;
    }

    // ══ MASCOTA ══
    const mId     = crypto.randomUUID();
    const mNombre = document.getElementById('m_nombre').value.trim();

    let fotoMascotaUrl = `https://placehold.co/150x150/C5C2FF/7A75C9?text=${encodeURIComponent(mNombre)}`;
    if (fotoMascotaB64 && enLinea) {
      try {
        btn.textContent = '⏳ Subiendo foto de mascota...';
        fotoMascotaUrl = await subirFotoCloudinary(fotoMascotaB64);
      } catch(e) {
        console.warn('Cloudinary falló, usando placeholder:', e.message);
      }
    }

    const mascotaPayload = {
      nombre:     mNombre,
      tipo:       document.getElementById('m_tipo').value,
      genero:     document.getElementById('m_genero').value,
      edad:       parseFloat(document.getElementById('m_edad').value),
      fotografia: fotoMascotaUrl
    };
    await DB_MASCOTAS.put({ _id: mId, ...mascotaPayload, fotoBase64: fotoMascotaB64, remoteId: null, syncStatus: 'pending_create' });
    let idMascota = mId;

    if (enLinea) {
      try {
        btn.textContent = '⏳ Registrando mascota...';
        const res = await fetch(`${API_URL}/api/v1/mascotas`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(mascotaPayload)
        });
        if (!res.ok) throw new Error('Mascota: ' + await res.text());
        const creada = await res.json();
        idMascota = creada.id;
        const doc = await DB_MASCOTAS.get(mId);
        await DB_MASCOTAS.put({ ...doc, remoteId: creada.id, syncStatus: 'synced' });
      } catch(fe) { console.warn('[Censo] Sin red para mascota:', fe.message); }
    }

    // ══ CENSO ══
    const cId = crypto.randomUUID();
    const censoPayload = {
      idMascota:  idMascota,
      idDueno:    idDueno,
      fotografia: imagenBase64,
      lat:        latActual,
      lon:        lonActual,
      idProyecto: ID_PROYECTO,
      color:      COLOR_PROYECTO
    };
    await DB_CENSOS.put({ _id: cId, ...censoPayload, remoteId: null, syncStatus: 'pending_create' });

    if (enLinea) {
      try {
        btn.textContent = '⏳ Guardando censo...';
        const token = localStorage.getItem('token');
        const res = await fetch(`${API_URL}/api/v1/censos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(censoPayload)
        });
        if (!res.ok) throw new Error('Censo: ' + await res.text());
        const creado = await res.json();
        const doc = await DB_CENSOS.get(cId);
        await DB_CENSOS.put({ ...doc, remoteId: creado.id, syncStatus: 'synced' });
      } catch(fe) { console.warn('[Censo] Sin red para censo:', fe.message); }
    }

    mostrarAlerta('censoAlerta',
      enLinea
        ? '✅ Censo registrado y sincronizado correctamente.'
        : '⏳ Guardado localmente. Se sincronizará al recuperar conexión.',
      enLinea ? 'success' : 'warning'
    );
    limpiarFormulario();

  } catch(err) {
    console.error('[Censo]', err);
    mostrarAlerta('censoAlerta', 'Error: ' + err.message, 'danger');
  } finally {
    btn.disabled = false; btn.textContent = '💾 Guardar Censo';
  }
}

// ============================================================
// Limpiar formulario
// ============================================================
function limpiarFormulario() {
  ['m_nombre','m_edad','d_nombres','d_apellidos','d_documento','d_telefono','d_ciudad','d_direccion']
    .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  document.getElementById('m_tipo').value   = '';
  document.getElementById('m_genero').value = '';
  imagenBase64 = ''; fotoMascotaB64 = ''; latActual = null; lonActual = null;
  ['fotoPreview','prevMascota'].forEach(id => document.getElementById(id).classList.add('d-none'));
  document.getElementById('fotoInfo').innerHTML   = '';
  document.getElementById('coords').innerHTML     = '';
  document.getElementById('inputFoto').value      = '';
  document.getElementById('fotoMascota').value    = '';
  // Detener cámara mascota si quedó abierta
  if (streamMascota) { streamMascota.getTracks().forEach(t => t.stop()); streamMascota = null; }
  document.getElementById('videoMascota').style.display  = 'none';
  document.getElementById('btnFotoMascota').style.display = 'none';
  document.getElementById('btnCamaraMascota').textContent = '📷 Abrir cámara';
  const b = document.getElementById('btnUbicacion');
  b.textContent = '📍 Detectar mi ubicación actual';
  b.className   = 'btn btn-pwa-secondary w-100 mb-3';
  b.disabled    = false;
  if (miniMapa) { miniMapa.remove(); miniMapa = null; }
  toggleDueno('existente');
  irPaso(1);
  cargarPersonasSelector();
}

function mostrarAlerta(id, msg, tipo) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `alert alert-${tipo}`;
  el.textContent = msg;
  el.classList.remove('d-none');
  window.scrollTo(0, 0);
  if (tipo === 'success') setTimeout(() => el.classList.add('d-none'), 6000);
}
</script>
