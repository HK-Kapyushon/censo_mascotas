<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#534AB7">
  <title>Personas — Censo de Mascotas</title>
  <link rel="manifest" href="../manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-pwa">
  <div class="container-fluid px-3">
    <button class="btn btn-sm btn-outline-light me-2" onclick="window.location.href='../index.html'">← Volver</button>
    <span class="navbar-brand mb-0">👤 Personas</span>
    <div class="ms-auto d-flex align-items-center gap-2">
      <span id="syncStatus" class="badge bg-secondary">Comprobando...</span>
      <button id="btnSync" class="btn btn-sm btn-outline-light" onclick="sincronizarTodo()">⟳ Sync</button>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div id="personaAlerta" class="alert d-none"></div>

  <!-- Formulario registro -->
  <div class="card-pwa">
    <h5 class="fw-bold mb-3">Registrar Persona / Encuestador</h5>
    <form id="personaForm" novalidate>
      <div class="row g-2">
        <div class="col-sm-6">
          <input class="form-control" id="nombres" placeholder="Nombres *" required>
        </div>
        <div class="col-sm-6">
          <input class="form-control" id="apellidos" placeholder="Apellidos *" required>
        </div>
        <div class="col-sm-4">
          <select class="form-select" id="tipoDocumento">
            <option value="">Tipo documento</option>
            <option value="CC">CC</option>
            <option value="CE">CE</option>
            <option value="Pasaporte">Pasaporte</option>
            <option value="TI">TI</option>
          </select>
        </div>
        <div class="col-sm-4">
          <input class="form-control" id="documento" placeholder="N° Documento">
        </div>
        <div class="col-sm-4">
          <input class="form-control" id="telefono" placeholder="Teléfono" type="tel">
        </div>
        <div class="col-sm-6">
          <input class="form-control" id="direccion" placeholder="Dirección">
        </div>
        <div class="col-sm-6">
          <input class="form-control" id="ciudad" placeholder="Ciudad">
        </div>
        <div class="col-sm-6">
          <input class="form-control" id="usuario" placeholder="Usuario *" required>
        </div>
        <div class="col-sm-6">
          <input class="form-control" id="contrasena" type="password" placeholder="Contraseña *" required>
        </div>
      </div>
      <button class="btn btn-pwa-primary mt-3 w-100" type="submit">Guardar Persona</button>
    </form>
  </div>

  <!-- Listado -->
  <div class="card-pwa">
    <h5 class="fw-bold mb-3">Personas Registradas</h5>
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Documento</th>
            <th>Teléfono</th>
            <th>Ciudad</th>
            <th>Usuario</th>
          </tr>
        </thead>
        <tbody id="listaPersonas">
          <tr><td colspan="5" class="text-center text-muted">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pouchdb@9.0.0/dist/pouchdb.min.js"></script>
<script src="../js/sync.js"></script>
<script src="../js/db.js"></script>
<script src="../js/persona.js"></script>
<script>
  if (!localStorage.getItem('token')) window.location.href = '../login.html';
</script>
</body>
</html>
